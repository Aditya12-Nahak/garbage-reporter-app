<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Garbage Reporter</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h2>Garbage Reporter</h2>

  <div style="padding:10px; background:#f5f5f5; display:flex; gap:20px; font-weight:bold;">
    <div>Total Reported: <span id="totalCount">0</span></div>
    <div>In Progress: <span id="inProgressCount">0</span></div>
    <div>Cleaned: <span id="cleanedCount">0</span></div>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase -->
  <script type="module" src="firebase.js"></script>

  <!-- App JS -->
  <script src="app.js"></script>

</body>
</html>
